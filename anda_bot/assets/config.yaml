## anda_bot runtime configuration
#
# This file is created automatically on first launch.
# It contains both startup and runtime settings.
# Choose the active provider with `model.active`, then fill in that provider entry
# or export a matching API key environment variable.
# To switch models later, point `model.active` at a different provider key.
# Supported model API key env vars include DEEPSEEK_API_KEY, MINIMAX_API_KEY,
# OPENAI_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY, GOOGLE_API_KEY,
# MIMO_API_KEY, MOONSHOT_API_KEY, KIMI_API_KEY, BIGMODEL_API_KEY, and GLM_API_KEY.

addr: 127.0.0.1:8042

# Optional: for example http://127.0.0.1:7890
# https_proxy: http://127.0.0.1:7890

model:
  active: "deepseek-v4-pro"
  providers:
    - family: anthropic
      model: "deepseek-v4-pro"
      api_base: "https://api.deepseek.com/anthropic"
      api_key: ""
      context_window: 1000000
      max_output: 384000
      labels: ["pro", "hippocampus"]
      disabled: false

    - family: anthropic
      model: "MiniMax-M2.7-highspeed"
      api_base: "https://api.minimaxi.com/anthropic/v1"
      api_key: ""
      context_window: 200000
      max_output: 130000
      labels: ["lite"]
      disabled: false

    - family: openai
      model: "gpt-5.5"
      api_base: "https://api.openai.com/v1"
      api_key: ""
      context_window: 1000000
      max_output: 128000
      labels: ["pro", "hippocampus"]
      disabled: false

    - family: openai
      model: "gpt-5.4-mini"
      api_base: "https://api.openai.com/v1"
      api_key: ""
      context_window: 400000
      max_output: 128000
      labels: ["flash", "hippocampus"]
      disabled: false

    - family: anthropic
      model: "claude-opus-4-7"
      api_base: "https://api.anthropic.com/v1"
      api_key: ""
      context_window: 1000000
      max_output: 128000
      labels: ["pro", "hippocampus"]
      disabled: false

    - family: anthropic
      model: "claude-haiku-4-5"
      api_base: "https://api.anthropic.com/v1"
      api_key: ""
      context_window: 200000
      max_output: 64000
      labels: ["flash", "hippocampus"]
      disabled: false

    - family: gemini
      model: "gemini-pro-latest"
      api_base: "https://generativelanguage.googleapis.com/v1beta/models"
      api_key: ""
      context_window: 1000000
      max_output: 64000
      labels: ["pro", "hippocampus"]
      disabled: false

    - family: gemini
      model: "gemini-flash-latest"
      api_base: "https://generativelanguage.googleapis.com/v1beta/models"
      api_key: ""
      context_window: 1000000
      max_output: 64000
      labels: ["flash", "hippocampus"]
      disabled: false

    - family: gemini
      model: "gemini-flash-lite-latest"
      api_base: "https://generativelanguage.googleapis.com/v1beta/models"
      api_key: ""
      context_window: 1000000
      max_output: 64000
      labels: ["lite"]
      disabled: false

    - family: anthropic
      model: "mimo-v2.5-pro"
      api_base: "https://api.xiaomimimo.com/anthropic/v1"
      api_key: ""
      context_window: 1000000
      max_output: 128000
      labels: ["pro", "fallback"]
      disabled: false
      bearer_auth: true

    - family: anthropic
      model: "mimo-v2.5"
      api_base: "https://api.xiaomimimo.com/anthropic/v1"
      api_key: ""
      context_window: 1000000
      max_output: 128000
      labels: ["flash", "fallback"]
      disabled: false
      bearer_auth: true

    - family: openai
      model: "kimi-k2.6"
      api_base: "https://api.moonshot.cn/v1"
      api_key: ""
      context_window: 256000
      max_output: 32000
      labels: ["pro"]
      disabled: false

    - family: anthropic
      model: "glm-5.1"
      api_base: "https://open.bigmodel.cn/api/anthropic"
      api_key: ""
      context_window: 200000
      max_output: 128000
      labels: ["pro", "hippocampus"]
      disabled: false

tts:
  enabled: false
  default_provider: edge
  default_voice: alloy
  default_format: mp3
  max_text_length: 4096
